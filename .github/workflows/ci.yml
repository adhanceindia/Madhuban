# .github/workflows/ci.yml
name: CI
on:
  push: { branches: [main] }
  pull_request: { branches: [main] }
permissions:
  contents: read
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - run: npm run lint
      - run: npm run build
        env:
          # Build must not require real secrets — lazy init covers this.
          DATABASE_URI: postgres://user:pass@localhost:5432/db
      # Informational only: surfaces production advisories on every run without
      # wedging main. Dependabot drives the actual upgrades via reviewable PRs.
      # (--omit=dev: dev-tool advisories like esbuild/babel don't ship to prod.)
      - run: npm audit --audit-level=high --omit=dev
        continue-on-error: true

# NOTE: A CodeQL job previously lived here but was removed — this is a PRIVATE
# repo, and code scanning / CodeQL requires GitHub Advanced Security (paid).
# To re-add it, enable GHAS + Code scanning in repo Settings → Security, then
# restore a `codeql` job with permissions { actions: read, security-events: write,
# contents: read } running github/codeql-action/init@v3 + analyze@v3.
